<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ "Sign Up" if mode == "signup" else "Log In" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="panel">
        <h1>{{ "Create Account" if mode == "signup" else "Log In" }}</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post" class="form-grid">
          <label for="email">Email
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>
          <label for="password">Password
            <input id="password" name="password" type="password" autocomplete="{{ 'new-password' if mode == 'signup' else 'current-password' }}" required />
          </label>
          <button type="submit">{{ "Sign Up" if mode == "signup" else "Log In" }}</button>
        </form>
        {% if mode == "signup" %}
          <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
        {% else %}
          <p class="muted">New here? <a href="{{ url_for('signup') }}">Create an account</a>.</p>
        {% endif %}
      </section>
    </main>
  </body>
</html>
